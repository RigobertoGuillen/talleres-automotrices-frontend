name: Frontend CI

on:
  pull_request:
    branches:
      - main

  push:
    branches:
      - main
      - develop

jobs:
  lint-build:

    runs-on: ubuntu-latest

    steps:

      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Instalar Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Ejecutar ESLint
        run: npm run lint

      - name: Compilar proyecto
        run: npm run build